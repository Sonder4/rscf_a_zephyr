name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest jinja2 pyyaml

      - name: Run unit tests
        run: python -m pytest tests/unit -q

  firmware-build:
    runs-on: ubuntu-22.04
    env:
      ZEPHYR_TOOLCHAIN_VARIANT: gnuarmemb
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ccache \
            curl \
            device-tree-compiler \
            git \
            gperf \
            libmagic1 \
            ninja-build \
            unzip \
            xz-utils

      - name: Install Arm GNU Toolchain 14.3.rel1
        run: |
          TOOLCHAIN_ROOT="$HOME/.local/arm-gnu-toolchain-14.3.rel1-x86_64-arm-none-eabi"
          if [ ! -x "$TOOLCHAIN_ROOT/bin/arm-none-eabi-gcc" ]; then
            mkdir -p "$HOME/.local"
            curl -fsSL \
              https://developer.arm.com/-/media/Files/downloads/gnu/14.3.rel1/binrel/arm-gnu-toolchain-14.3.rel1-x86_64-arm-none-eabi.tar.xz \
              -o /tmp/arm-gnu-toolchain-14.3.rel1-x86_64-arm-none-eabi.tar.xz
            tar -xJf /tmp/arm-gnu-toolchain-14.3.rel1-x86_64-arm-none-eabi.tar.xz -C "$HOME/.local"
          fi
          echo "GNUARMEMB_TOOLCHAIN_PATH=$TOOLCHAIN_ROOT" >> "$GITHUB_ENV"

      - name: Install host build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install --user colcon-common-extensions vcstool
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Bootstrap workspace
        run: ./scripts/bootstrap/bootstrap.sh

      - name: Build firmware
        run: |
          source .venv/bin/activate
          cd .workspace
          west build -b rscf_a_f427iih6 ../app -d build_vnext
        shell: bash

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rscf-a-zephyr-firmware
          path: |
            .workspace/build_vnext/zephyr/zephyr.elf
            .workspace/build_vnext/zephyr/zephyr.hex
            .workspace/build_vnext/zephyr/zephyr.bin
            .workspace/build_vnext/zephyr/zephyr.map

  ros2-workspace-build:
    runs-on: ubuntu-22.04
    container:
      image: ros:humble-ros-base-jammy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ROS 2 workspace dependencies
        run: |
          apt-get update
          apt-get install -y python3-colcon-common-extensions

      - name: Build host ROS 2 workspace
        run: |
          source /opt/ros/humble/setup.bash
          cd ros2_ws
          colcon build
        shell: bash
